<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashCard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Confere aí</h1>
    <nav>
        <a href="#">Início</a>
    </nav>
</header>

<main>
    <h2>Descubra a verdade passando o mouse</h2>

    <section>

        <article class="cartao">
            <div class="cartao-interno">

                <div class="cartao-frente">
                    <img src="https://assetsio.gnwcdn.com/joel-sarah-the-last-of-us-photo.jpeg?width=1200&height=1200&fit=crop&quality=100&format=png&enable=upscale&auto=webp" alt="Joel" class="cartao-imagem">
                    <p>joel e sara</p>
                </div>

                <div class="cartao-verso">
                    <img src="https://assetsio.gnwcdn.com/joel-sarah-the-last-of-us-photo.jpeg?width=1200&height=1200&fit=crop&quality=100&format=png&enable=upscale&auto=webp" alt="Joel" class="cartao-imagem">
                    <p>Ganley eterno.</p>
                </div>

            </div>
        </article>

        <article class="cartao">
            <div class="cartao-interno">

                <div class="cartao-frente">
                    <img src="https://assetsio.gnwcdn.com/joel-sarah-the-last-of-us-photo.jpeg?width=1200&height=1200&fit=crop&quality=100&format=png&enable=upscale&auto=webp" alt="Joel" class="cartao-imagem">
                    <p>ghost of tushima </p>
                </div>

                <div class="cartao-verso">
                    <img src="https://assetsio.gnwcdn.com/joel-sarah-the-last-of-us-photo.jpeg?width=1200&height=1200&fit=crop&quality=100&format=png&enable=upscale&auto=webp" alt="Joel" class="cartao-imagem">
                    <p>Elli.</p>
                </div>

            </div>
        </article>

    </section>
</main>

<footer>
    <p>Projeto feito por Rafael</p>
</footer>

</body>
</html>

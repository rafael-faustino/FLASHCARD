<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashCard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Confere aí</h1>
    <nav>
        <a href="#">Início</a>
    </nav>
</header>

<main>

    <h2>Descubra a verdade passando o mouse</h2>

    <section>

        <article class="cartao">
            <div class="cartao-interno">

                <div class="cartao-frente">
                    <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS-pdLl3xJ88txLWOlcCd5nH_Z5P9u2r2tauiG681Ij_l3299JIVVFuV6Qa&s=10"
                        alt="Gabriel Ganley"
                        class="cartao-imagem">

                    <p>Gabriel Ganley conseguiu seu físico apenas com genética?</p>
                </div>

                <div class="cartao-verso">
                    <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS-pdLl3xJ88txLWOlcCd5nH_Z5P9u2r2tauiG681Ij_l3299JIVVFuV6Qa&s=10"
                        alt="Gabriel Ganley"
                        class="cartao-imagem">

                    <p>Não. O físico foi resultado de anos de treino, disciplina, alimentação e dedicação ao fisiculturismo.</p>
                </div>

            </div>
        </article>

    </section>

</main>

<footer>
    <p>Projeto feito por Rafael fM</p>
</footer>

</body>
</html>
